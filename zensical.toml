[project]

# The site_name is shown in the page header and the browser window title
#
# Read more: https://zensical.org/docs/setup/basics/#site_name
site_name = "PurpleSec"
site_description = "Offensive and defensive cybersecurity writeups, Hack The Box walkthroughs, OSCP/CPTS/PNPT/CISSP certification prep, and security blog by Bilash J. Shahi."
site_author = "Bilash J. Shahi"
site_url = "https://purplesec.org/"

copyright = """
Copyright &copy; 2025 – 2026 Bilash J. Shahi | PurpleSec
"""

