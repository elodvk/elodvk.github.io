<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bb86fc" />
      <stop offset="100%" stop-color="#3700b3" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Outer Shield -->
  <path d="M50 5 L90 20 L90 50 C90 75 50 95 50 95 C50 95 10 75 10 50 L10 20 Z" fill="none" stroke="url(#purpleGrad)" stroke-width="6" filter="url(#neonGlow)" />
  <!-- Inner Circuit Pattern -->
  <path d="M50 25 L50 40 M35 35 L50 50 L65 35 M50 50 L50 75 M35 60 L50 50 L65 60" stroke="#bb86fc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Dots -->
  <circle cx="50" cy="25" r="3" fill="#bb86fc" />
  <circle cx="35" cy="35" r="3" fill="#bb86fc" />
  <circle cx="65" cy="35" r="3" fill="#bb86fc" />
  <circle cx="35" cy="60" r="3" fill="#bb86fc" />
  <circle cx="65" cy="60" r="3" fill="#bb86fc" />
  <circle cx="50" cy="75" r="3" fill="#bb86fc" />
</svg>
